name: Format, Analyze, Check Localizations and Run Tests

on:
  push:
    branches: [main]
    paths:
      - "**.dart"
      - "lib/**"
      - "test/**"
      - "assets/**"
      - "pubspec.yaml"
  pull_request:
    branches: [main]
    paths:
      - "**.dart"
      - "lib/**"
      - "test/**"
      - "assets/**"
      - "pubspec.yaml"
  workflow_dispatch:

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Write firebase_options.dart
        shell: bash
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: |
          echo $FIREBASE_OPTIONS > lib/firebase_options.dart

      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings --no-pub

      - name: Localization check
        run: dart run tool/locale/check_localizations.dart

      - name: Run tests
        run: flutter test --no-pub
