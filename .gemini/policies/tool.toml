[[rule]]
toolName = ["activate_skill", "enter_plan_mode"]
decision = "allow"
priority = 100

[[rule]]
toolName = ["write_file", "replace"]
decision = "allow"
priority = 100
modes = ["autoEdit", "default"]

[[rule]]
toolName = ["push_files", "merge_pull_request", "create_branch", "create_repository", "grep_search"] # (SearchText) rg --g, is not a valid command
decision = "deny"
priority = 999

