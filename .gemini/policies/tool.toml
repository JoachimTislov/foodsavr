[[rule]]
toolName = ["activate_skill", "enter_plan_mode"]
decision = "allow"
priority = 100

[[rule]]
toolName = ["write_file", "replace"]
decision = "allow"
priority = 100
modes = ["autoEdit", "default"]

[[rule]]
toolName = ["mcp_github_push_files", "mcp_github_merge_pull_request", "mcp_github_create_branch", "mcp_github_create_repository", "grep_search"] # (SearchText) rg --g, is not a valid command
decision = "deny"
priority = 999

[[rule]]
toolName = ["google_web_search", "web_fetch"]
decision = "deny"
priority = 999

